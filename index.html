<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Splat Viewer</title>
  <style>
    body {
      margin: 0;
    }

    canvas {
      display: block;
      touch-action: none;
    }
  </style>
</head>

<body>
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdnjs.cloudflare.com/ajax/libs/three.js/0.180.0/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.180.0/examples/jsm/",
        "@sparkjsdev/spark": "./spark.module.min.js"
      }
    }
  </script>

  <script type="module">
    import * as THREE from "three";
    import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";
    import { SparkRenderer, SplatMesh, SparkControls, utils } from "@sparkjsdev/spark";

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 1000);

    const renderer = new THREE.WebGLRenderer();
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const localFrame = new THREE.Group();
    scene.add(localFrame);
    localFrame.add(camera);

    const spark = new SparkRenderer({
      renderer,
      maxStdDev: Math.sqrt(5),
    });
    scene.add(spark);

    const controls = new SparkControls({
      canvas: renderer.domElement,
    });
    controls.pointerControls.reverseRotate = utils.isMobile();
    controls.pointerControls.rotateSpeed *= 2.0;
    controls.pointerControls.slideSpeed *= 0.75;

    const gltfLoader = new GLTFLoader();
    const sceneData = await fetch("./scene.json").then((response) => response.json());

    for (const splat of sceneData.splats ?? []) {
      const splatMesh = new SplatMesh({
        url: `./${splat.filename}`,
        lod: true,
      });

      splatMesh.position.fromArray(splat.transform?.translation ?? [0, 0, 0]);
      splatMesh.quaternion.fromArray(splat.transform?.quaternion ?? [0, 0, 0, 1]);

      const scale = splat.transform?.scale ?? 1;
      splatMesh.scale.set(scale, scale, scale);
      scene.add(splatMesh);
    }

    for (const mesh of sceneData.meshes ?? []) {
      try {
        const gltf = await gltfLoader.loadAsync(`./${mesh.filename}`);
        const model = gltf.scene;

        model.traverse((child) => {
          if (!child.isMesh) {
            return;
          }

          const materials = Array.isArray(child.material) ? child.material : [child.material];
          child.material = materials.map((material) => new THREE.MeshBasicMaterial({
            color: material?.color ?? 0x888888,
            map: material?.map ?? null,
            side: THREE.DoubleSide,
          }));

          if (child.material.length === 1) {
            child.material = child.material[0];
          }
        });

        model.position.fromArray(mesh.transform?.translation ?? [0, 0, 0]);
        model.quaternion.fromArray(mesh.transform?.quaternion ?? [0, 0, 0, 1]);

        const scale = mesh.transform?.scale ?? [1, 1, 1];
        model.scale.set(scale[0], scale[1], scale[2]);
        scene.add(model);
      } catch (error) {
        console.warn(`Failed to load mesh: ${mesh.filename}`, error);
      }
    }

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    renderer.setAnimationLoop(() => {
      controls.update(localFrame, camera);
      renderer.render(scene, camera);
    });
  </script>
</body>

</html>
